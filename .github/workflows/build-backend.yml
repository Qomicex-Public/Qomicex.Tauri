name: Build Backend (AOT)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v0.2.0-beta)'
        required: true
        default: 'v0.1.0'
      buildPlatform:
        description: '构建平台'
        required: true
        default: 'linux'
        type: choice
        options:
          - windows
          - linux
          - macos
          - loongarch64
          - all
      linuxBundles:
        description: 'Linux 打包格式（仅 linux/all 时有效）'
        required: false
        default: 'appimage,deb,rpm'
        type: choice
        options:
          - appimage,deb,rpm
          - appimage,deb
          - appimage,rpm
          - deb,rpm
          - appimage
          - deb
          - rpm
      macosArch:
        description: 'macOS 架构（仅 macos/all 时有效）'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - arm64
          - x64
      windowsArch:
        description: 'Windows 架构（仅 windows/all 时有效）'
        required: false
        default: 'x64'
        type: choice
        options:
          - both
          - arm64
          - x64
      linuxArch:
        description: 'Linux 架构（仅 linux/all 时有效）'
        required: false
        default: 'x64'
        type: choice
        options:
          - both
          - arm64
          - x64

env:
  CARGO_TERM_COLORS: always
  GITHUB_SHA: ${{ github.sha }}

jobs:
  windows-x64:
    if: ${{ (github.event.inputs.buildPlatform == 'windows' || github.event.inputs.buildPlatform == 'all') && (github.event.inputs.windowsArch == 'both' || github.event.inputs.windowsArch == 'x64') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r win-x64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
        shell: pwsh
      - run: |
          Move-Item -Force src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo.exe src-tauri/binaries/backend.exe
          Remove-Item -Recurse -Force src-tauri/binaries/tmp
        shell: pwsh
      - run: npm ci
      - run: npm run tauri -- build --bundles nsis
      - name: Generate update manifest fragment
        shell: pwsh
        run: |
          Write-Output "=== Bundle dir contents ==="
          Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle" | Select-Object FullName
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Include "*.exe","*.msi" | Select-Object -First 1
          if (-not $installer) { throw "No installer (.exe/.msi) found in bundle directory" }
          $assetName = $installer.Name
          $url = "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$assetName"
          $platform = "windows-x86_64"
          $fragment = @{ $platform = @{ url = $url } }
          $json = $fragment | ConvertTo-Json -Compress -Depth 10
          Set-Content -Path "update-fragment-$platform.json" -Value $json
          Write-Output "Fragment: $json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-windows-x64, path: src-tauri/target/release/bundle/ }

  windows-arm64:
    if: ${{ (github.event.inputs.buildPlatform == 'windows' || github.event.inputs.buildPlatform == 'all') && (github.event.inputs.windowsArch == 'both' || github.event.inputs.windowsArch == 'arm64') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-pc-windows-msvc }
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r win-arm64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
        shell: pwsh
      - run: |
          Move-Item -Force src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo.exe src-tauri/binaries/backend.exe
          Remove-Item -Recurse -Force src-tauri/binaries/tmp
        shell: pwsh
      - run: npm ci
      - run: npm run tauri -- build --bundles nsis --target aarch64-pc-windows-msvc
      - name: Generate update manifest fragment
        shell: pwsh
        run: |
          Write-Output "=== Bundle dir contents ==="
          Get-ChildItem -Recurse -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle" | Select-Object FullName
          $installer = Get-ChildItem -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle" -Recurse -Include "*.exe","*.msi" | Select-Object -First 1
          if (-not $installer) { throw "No installer (.exe/.msi) found in bundle directory" }
          $assetName = $installer.Name
          $url = "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$assetName"
          $platform = "windows-aarch64"
          $fragment = @{ $platform = @{ url = $url } }
          $json = $fragment | ConvertTo-Json -Compress -Depth 10
          Set-Content -Path "update-fragment-$platform.json" -Value $json
          Write-Output "Fragment: $json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-windows-arm64, path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/ }

  linux-x64:
    if: ${{ (github.event.inputs.buildPlatform == 'linux' || github.event.inputs.buildPlatform == 'all') && (github.event.inputs.linuxArch == 'both' || github.event.inputs.linuxArch == 'x64') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-unknown-linux-gnu }
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r linux-x64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
      - run: |
          mv src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo src-tauri/binaries/backend
          rm -rf src-tauri/binaries/tmp
      - run: npm ci
      - run: npm run tauri -- build --bundles ${{ github.event.inputs.linuxBundles }}
      - name: Generate update manifest fragment
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "=== Bundle dir contents ==="
          find "$BUNDLE_DIR" -type f | head -30
          INSTALLER=$(find "$BUNDLE_DIR" -name '*.deb' | head -1)
          [ -z "$INSTALLER" ] && INSTALLER=$(find "$BUNDLE_DIR" -name '*.rpm' | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "No .deb/.rpm installer found, skipping update fragment"
            exit 0
          fi
          ASSET_NAME=$(basename "$INSTALLER")
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$ASSET_NAME"
          PLATFORM="linux-x86_64"
          echo "{\"$PLATFORM\":{\"url\":\"$URL\"}}" > "update-fragment-$PLATFORM.json"
          cat "update-fragment-$PLATFORM.json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-linux-x64, path: src-tauri/target/release/bundle/ }

  linux-arm64:
    if: ${{ (github.event.inputs.buildPlatform == 'linux' || github.event.inputs.buildPlatform == 'all') && (github.event.inputs.linuxArch == 'both' || github.event.inputs.linuxArch == 'arm64') }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-unknown-linux-gnu }
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r linux-arm64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
      - run: |
          mv src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo src-tauri/binaries/backend
          rm -rf src-tauri/binaries/tmp
      - run: npm ci
      - run: npm run tauri -- build --bundles ${{ github.event.inputs.linuxBundles }}
      - name: Generate update manifest fragment
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "=== Bundle dir contents ==="
          find "$BUNDLE_DIR" -type f | head -30
          INSTALLER=$(find "$BUNDLE_DIR" -name '*.deb' | head -1)
          [ -z "$INSTALLER" ] && INSTALLER=$(find "$BUNDLE_DIR" -name '*.rpm' | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "No .deb/.rpm installer found, skipping update fragment"
            exit 0
          fi
          ASSET_NAME=$(basename "$INSTALLER")
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$ASSET_NAME"
          PLATFORM="linux-aarch64"
          echo "{\"$PLATFORM\":{\"url\":\"$URL\"}}" > "update-fragment-$PLATFORM.json"
          cat "update-fragment-$PLATFORM.json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-linux-arm64, path: src-tauri/target/release/bundle/ }

  linux-loongarch64:
    if: ${{ github.event.inputs.buildPlatform == 'loongarch64' }}
    runs-on: [self-hosted, loongarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: loongarch64-unknown-linux-gnu }
      - uses: swatinem/rust-cache@v2
      - name: Setup .NET (LoongArch SDK)
        run: |
          curl -sL "https://github.com/loongson/dotnet/releases/download/v10.0.109-loongarch64/dotnet-sdk-10.0.109-linux-loongarch64.tar.gz" | tar xz -C /usr/local/dotnet
          echo "/usr/local/dotnet" >> $GITHUB_PATH
          dotnet nuget add source -n lnuget.loongnix.cn --protocol-version 3 https://lnuget.loongnix.cn/v3/index.json
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r linux-loongarch64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
      - run: |
          mv src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo src-tauri/binaries/backend
          rm -rf src-tauri/binaries/tmp
      - run: npm ci
      - run: npm run tauri -- build --bundles ${{ github.event.inputs.linuxBundles }}
      - name: Generate update manifest fragment
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          INSTALLER=$(find "$BUNDLE_DIR" -name '*.deb' | head -1)
          [ -z "$INSTALLER" ] && INSTALLER=$(find "$BUNDLE_DIR" -name '*.rpm' | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "No .deb/.rpm installer found, skipping update fragment"
            exit 0
          fi
          ASSET_NAME=$(basename "$INSTALLER")
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$ASSET_NAME"
          PLATFORM="linux-loongarch64"
          echo "{\"$PLATFORM\":{\"url\":\"$URL\"}}" > "update-fragment-$PLATFORM.json"
          cat "update-fragment-$PLATFORM.json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-linux-loongarch64, path: src-tauri/target/release/bundle/ }

  macos-arm64:
    if: ${{ (github.event.inputs.buildPlatform == 'macos' || github.event.inputs.buildPlatform == 'all') && (github.event.inputs.macosArch == 'both' || github.event.inputs.macosArch == 'arm64') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r osx-arm64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
      - run: |
          mv src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo src-tauri/binaries/backend
          rm -rf src-tauri/binaries/tmp
      - run: npm ci
      - run: npm run tauri -- build --bundles app
      - name: Create DMG
        run: |
          APP="src-tauri/target/release/bundle/macos/qomicex-launcher.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          codesign --force --deep --sign - "$APP"
          hdiutil create -volname "Qomicex Launcher" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_DIR/qomicex-launcher_${{ github.event.inputs.version }}_$(uname -m).dmg"
      - name: Generate update manifest fragment
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "=== Bundle dir contents ==="
          find "$BUNDLE_DIR" -type f | head -30
          DMG=$(find "$BUNDLE_DIR" -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No .dmg file found in $BUNDLE_DIR"
            exit 1
          fi
          ASSET_NAME=$(basename "$DMG")
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$ASSET_NAME"
          PLATFORM="darwin-aarch64"
          echo "{\"$PLATFORM\":{\"url\":\"$URL\"}}" > "update-fragment-$PLATFORM.json"
          cat "update-fragment-$PLATFORM.json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-macos-arm64, path: src-tauri/target/release/bundle/ }

  macos-x64:
    if: ${{ (github.event.inputs.buildPlatform == 'macos' || github.event.inputs.buildPlatform == 'all') && (github.event.inputs.macosArch == 'both' || github.event.inputs.macosArch == 'x64') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.QOMICEX_PAT }}
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-apple-darwin }
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: dotnet publish src-backend/Qomicex.Launcher.Backend.Neo/Qomicex.Launcher.Backend.Neo.csproj -c Release -r osx-x64 --self-contained true -p:DebugType=embedded -p:GitHash=${{ env.GITHUB_SHA }} -o src-tauri/binaries/tmp
      - run: |
          mv src-tauri/binaries/tmp/Qomicex.Launcher.Backend.Neo src-tauri/binaries/backend
          rm -rf src-tauri/binaries/tmp
      - run: npm ci
      - run: npm run tauri -- build --bundles app
      - name: Create DMG
        run: |
          APP="src-tauri/target/release/bundle/macos/qomicex-launcher.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          codesign --force --deep --sign - "$APP"
          hdiutil create -volname "Qomicex Launcher" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_DIR/qomicex-launcher_${{ github.event.inputs.version }}_$(uname -m).dmg"
      - name: Generate update manifest fragment
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "=== Bundle dir contents ==="
          find "$BUNDLE_DIR" -type f | head -30
          DMG=$(find "$BUNDLE_DIR" -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No .dmg file found in $BUNDLE_DIR"
            exit 1
          fi
          ASSET_NAME=$(basename "$DMG")
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/$ASSET_NAME"
          PLATFORM="darwin-x86_64"
          echo "{\"$PLATFORM\":{\"url\":\"$URL\"}}" > "update-fragment-$PLATFORM.json"
          cat "update-fragment-$PLATFORM.json"
      - uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ github.job }}
          path: update-fragment-*.json
      - uses: actions/upload-artifact@v4
        with: { name: qomicex-launcher-macos-x64, path: src-tauri/target/release/bundle/ }
